; =========================================================
; PlatformIO configuration with two display profiles
;
; 1) external_ili9488
;    ESP32 + externally connected ILI9488 TFT
;
; 2) cyd4_st7796
;    ESP32-32E / CYD 4" integrated board, ST7796, 480x320
;
; Select the active profile by changing default_envs below,
; or build explicitly with:
;   pio run -e external_ili9488
;   pio run -e cyd4_st7796
; =========================================================

[platformio]
;default_envs = cyd4_st7796
default_envs = external_ili9488

; =========================================================
; Common settings shared by both profiles
; =========================================================
[env]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

; =========================================================
; PROFILE 1: ESP32 + external ILI9488 TFT
; Original file: platformio.ini_ORI
; =========================================================
[env:external_ili9488]
build_flags =
    -D USER_SETUP_LOADED

    ; Custom colors
    -D TFT_DARKRED=0x7800
    -D TFT_DARKYELLOW=0xB3E0

    ; Display driver
    -D ILI9488_DRIVER

    ; TFT SPI pins
    -D TFT_CS=15
    -D TFT_RST=2
    ;-D TFT_DC=0      ; ESP32U with antenna
    -D TFT_DC=5       ; ESP32 standard
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_MISO=19

    ; Touch
    -D TOUCH_CS=22
    -D SPI_TOUCH_FREQUENCY=2500000

    ; SPI speeds
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=16000000

    ; Backlight
    -D TFT_BLP=4

    ; Buzzer
    -D BUZZER=21

    ; Fonts
    -D LOAD_GLCD=1
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF

; =========================================================
; PROFILE 2: ESP32-32E / CYD 4" integrated board
; ST7796, 480x320
; Original file: platformio.ini
; =========================================================
[env:cyd4_st7796]
build_flags =
    -D USER_SETUP_LOADED

    ; Display driver
    -D ST7796_DRIVER

    ; TFT SPI pins
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D USE_HSPI_PORT

    ; Touch
    -D TOUCH_CS=33
    -D SPI_TOUCH_FREQUENCY=2500000

    ; SPI speeds
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

    ; Backlight
    -D TFT_BLP=27

    ; Buzzer / speaker connector
    -D BUZZER=25

    ; Fonts
    -D LOAD_GLCD
    -D LOAD_FONT1
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF

    ; Display behaviour
    -D TFT_ROTATION=3
    -D HB9_TFT_INVERT=0
